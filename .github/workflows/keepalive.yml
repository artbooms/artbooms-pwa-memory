name: Keep GitHub Actions Alive

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: artbooms-github-actions-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update keepalive file
        run: |
          mkdir -p data
          {
            echo "ARTBOOMS GitHub Actions keepalive"
            echo "Last automatic keepalive: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "Purpose: keep scheduled workflows active during long publishing breaks."
          } > data/github-actions-keepalive.txt

      - name: Commit keepalive update
        run: |
          if [ -z "$(git status --porcelain -- data/github-actions-keepalive.txt)" ]; then
            echo "No keepalive changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/github-actions-keepalive.txt
          git commit -m "Keep GitHub Actions scheduled workflows active"
          git push
